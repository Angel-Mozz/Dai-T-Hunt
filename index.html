<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #6C3FCF;
    --purple-light: #9B6FE8;
    --purple-dark: #3E1F8F;
    --gold: #F5A623;
    --gold-light: #FFD06B;
    --pink: #E8417B;
    --teal: #1DB88A;
    --dark: #0F0A1E;
    --dark2: #1A1030;
    --dark3: #221540;
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.1);
    --text: #F0ECF9;
    --muted: #9B8FC4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- BACKGROUND ---- */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108,63,207,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(232,65,123,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(245,166,35,0.15) 0%, transparent 60%);
  }

  /* floating icons background */
  .float-icons {
    position: absolute;
    inset: 0;
    font-size: 48px;
    opacity: 0.06;
    user-select: none;
  }
  .float-icons span {
    position: absolute;
    animation: floatDrift linear infinite;
  }

  @keyframes floatDrift {
    0%   { transform: translateY(0px) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* ---- LAYOUT ---- */
  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 999px;
    padding: 4px 16px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Bangers', cursive;
    font-size: 56px;
    letter-spacing: 3px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px rgba(108,63,207,0.8), 4px 4px 0 var(--purple-dark);
    margin-bottom: 8px;
  }

  .header h1 span {
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,166,35,0.8), 4px 4px 0 #8B5E00;
  }

  .header p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
  }

  /* ---- DECO ROW ---- */
  .deco-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .deco-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }

  .deco-pill:hover {
    border-color: rgba(255,255,255,0.25);
    color: var(--text);
  }

  .deco-pill .deco-ico {
    font-size: 16px;
  }

  /* ---- PROGRESS ---- */
  .progress-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 1.5rem;
    backdrop-filter: blur(8px);
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-title {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .progress-count {
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .progress-track {
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--purple-light), var(--pink), var(--gold));
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 12px rgba(155,111,232,0.6);
  }

  /* ---- CLUE CARDS ---- */
  .clue-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .clue-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 16px;
    transition: border-color 0.25s, background 0.25s, transform 0.15s;
    backdrop-filter: blur(8px);
  }

  .clue-card:focus-within {
    border-color: rgba(155,111,232,0.5);
    transform: translateX(2px);
  }

  .clue-card.is-correct {
    border-color: rgba(29,184,138,0.6);
    background: rgba(29,184,138,0.08);
  }

  .clue-card.is-wrong {
    border-color: rgba(232,65,123,0.5);
    background: rgba(232,65,123,0.06);
  }

  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s, color 0.25s;
  }

  .is-correct .step-num {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
    box-shadow: 0 0 10px rgba(29,184,138,0.5);
  }

  .is-wrong .step-num {
    background: var(--pink);
    border-color: var(--pink);
    color: #fff;
    box-shadow: 0 0 10px rgba(232,65,123,0.4);
  }

  .card-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 24px;
    text-align: center;
  }

  .card-input-wrap {
    flex: 1;
    min-width: 0;
  }

  .card-sublabel {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .is-correct .card-sublabel { color: #1DB88A; }
  .is-wrong .card-sublabel { color: var(--pink); }

  .card-input-wrap input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .card-input-wrap input::placeholder {
    color: rgba(155,143,196,0.4);
    font-weight: 600;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    border-radius: 999px;
    padding: 3px 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .badge-pending {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .badge-correct {
    background: rgba(29,184,138,0.2);
    color: #5DEDD8;
  }

  .badge-wrong {
    background: rgba(232,65,123,0.2);
    color: #F893B9;
  }

  /* ---- WIN MESSAGE ---- */
  .win-msg {
    text-align: center;
    margin-top: 1.5rem;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .win-msg h2 {
    font-family: 'Bangers', cursive;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,166,35,0.8), 3px 3px 0 #8B5E00;
    animation: winPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .win-msg p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
  }

  @keyframes winPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ---- RESET ---- */
  .reset-btn {
    display: block;
    margin: 1.5rem auto 0;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 24px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .reset-btn:hover {
    border-color: rgba(232,65,123,0.5);
    color: var(--pink);
    background: rgba(232,65,123,0.08);
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 480px) {
    .header h1 { font-size: 40px; }
    .deco-pill .deco-text { display: none; }
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="float-icons" id="floatIcons"></div>
</div>

<div class="container">

  <header class="header">
    <div class="header-label">With Love, all your people</div>
    <h1>DAI'S TREASURE<br><span>HUNT</span> TRACKER</h1>
    <p>Anota quién te dio cada pista — se valida automáticamente</p>
  </header>

  <div class="deco-row">
    <div class="deco-pill"><span class="deco-ico">🐈‍⬛</span><span class="deco-text"></span></div>
    <div class="deco-pill"><span class="deco-ico">⛸️</span><span class="deco-text"></span></div>
    <div class="deco-pill"><span class="deco-ico">🏛️</span><span class="deco-text"></span></div>
    <div class="deco-pill"><span class="deco-ico">🌮</span><span class="deco-text"></span></div>
    <div class="deco-pill"><span class="deco-ico">🗺️</span><span class="deco-text"></span></div>
    <div class="deco-pill"><span class="deco-ico">🏆</span><span class="deco-text"></span></div>
  </div>

  <div class="progress-section">
    <div class="progress-top">
      <span class="progress-title">Progreso del tesoro</span>
      <span class="progress-count" id="progressCount">0 / 17</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="clue-list" id="clueList"></div>

  <div class="win-msg" id="winMsg"></div>

  <button class="reset-btn" onclick="resetAll()">Reiniciar todo</button>

</div>

<script>
const ANSWERS = [
  "Angel","Luna","Oscar","Cami","Bernie","Alison","Reyna",
  "May","Angeles","Aaron","Liz","Jesús","Carlos","Omar",
  "Richie","Ivanna","Vicks"
];

const ICONS = ["🐾","🌙","⭐","🌸","🐻","✨","👑","🌺","😇","⚡","💫","✝️","🤠","🦁","💎","🦋","🔮"];

const FLOAT_ICONS = ["🐈‍⬛","⛸️","🏛️","🌮","🗺️","🏆","🐾","✨","🌙","⭐","💎","🔮"];

const STORAGE_KEY = "thunt_v3";

function loadInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : Array(17).fill("");
  } catch(e) { return Array(17).fill(""); }
}

function saveInputs(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e) {}
}

function normalize(s) {
  return (s || "").trim().toLowerCase()
    .normalize("NFD").replace(/\p{Diacritic}/gu, "")
    .replace(/[^a-z]/g, "");
}

let inputs = loadInputs();

// Build floating background icons
function buildFloating() {
  const container = document.getElementById("floatIcons");
  for (let i = 0; i < 20; i++) {
    const span = document.createElement("span");
    span.textContent = FLOAT_ICONS[i % FLOAT_ICONS.length];
    const left = Math.random() * 100;
    const delay = Math.random() * 20;
    const duration = 15 + Math.random() * 25;
    const size = 28 + Math.random() * 32;
    span.style.cssText = `left:${left}%;top:${100 + Math.random() * 20}vh;font-size:${size}px;animation-duration:${duration}s;animation-delay:-${delay}s;`;
    container.appendChild(span);
  }
}

// Render all cards
function render() {
  const list = document.getElementById("clueList");

  // Re-render only values (no full DOM rebuild to preserve focus)
  const cards = list.querySelectorAll(".clue-card");
  if (cards.length === 0) {
    buildCards(list);
  } else {
    updateCards(cards);
  }

  updateProgress();
  updateWin();
}

function buildCards(list) {
  ANSWERS.forEach((ans, i) => {
    const card = document.createElement("div");
    card.className = "clue-card";
    card.id = "card-" + i;

    card.innerHTML = `
      <div class="step-num" id="step-${i}">${i + 1}</div>
      <div class="card-icon">${ICONS[i]}</div>
      <div class="card-input-wrap">
        <div class="card-sublabel" id="sublabel-${i}">Pista #${i + 1}</div>
        <input type="text" placeholder="Escribe el nombre..." autocomplete="off" id="inp-${i}" value="${escapeHtml(inputs[i])}">
      </div>
      <span class="status-badge badge-pending" id="badge-${i}">Pendiente</span>
    `;

    list.appendChild(card);

    document.getElementById("inp-" + i).addEventListener("input", function(e) {
      inputs[i] = e.target.value;
      saveInputs(inputs);
      updateCard(i);
      updateProgress();
      updateWin();
    });

    updateCard(i);
  });
}

function updateCards(cards) {
  ANSWERS.forEach((ans, i) => updateCard(i));
}

function updateCard(i) {
  const val = inputs[i] || "";
  const isCorrect = val.trim() !== "" && normalize(val) === normalize(ANSWERS[i]);
  const isWrong   = val.trim() !== "" && !isCorrect;

  const card    = document.getElementById("card-" + i);
  const badge   = document.getElementById("badge-" + i);
  const sublbl  = document.getElementById("sublabel-" + i);

  if (!card) return;

  card.classList.toggle("is-correct", isCorrect);
  card.classList.toggle("is-wrong", isWrong);

  if (isCorrect) {
    badge.className = "status-badge badge-correct";
    badge.textContent = "Correcto";
    sublbl.textContent = "Pista #" + (i + 1);
  } else if (isWrong) {
    badge.className = "status-badge badge-wrong";
    badge.textContent = "Incorrecto";
    sublbl.textContent = "Pista #" + (i + 1);
  } else {
    badge.className = "status-badge badge-pending";
    badge.textContent = "Pendiente";
    sublbl.textContent = "Pista #" + (i + 1);
  }
}

function countCorrect() {
  return inputs.filter((v, i) => v.trim() !== "" && normalize(v) === normalize(ANSWERS[i])).length;
}

function updateProgress() {
  const n = countCorrect();
  const pct = Math.round((n / 17) * 100);
  document.getElementById("progressCount").textContent = n + " / 17";
  document.getElementById("progressFill").style.width = pct + "%";
}

function updateWin() {
  const n = countCorrect();
  const el = document.getElementById("winMsg");
  if (n === 17) {
    el.innerHTML = `<h2>ENCONTRASTE EL TESORO!</h2><p>Lo lograste — todas las pistas correctas</p>`;
  } else if (n >= 13) {
    el.innerHTML = `<p style="color:var(--gold-light);font-weight:800;font-size:15px;">Ya casi... faltan solo ${17 - n} pistas</p>`;
  } else {
    el.innerHTML = "";
  }
}

function resetAll() {
  if (confirm("Reiniciar todos los nombres?")) {
    inputs = Array(17).fill("");
    saveInputs(inputs);
    // Reset input fields
    ANSWERS.forEach((_, i) => {
      const inp = document.getElementById("inp-" + i);
      if (inp) inp.value = "";
      updateCard(i);
    });
    updateProgress();
    updateWin();
  }
}

function escapeHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

buildFloating();
render();
</script>

</body>
</html>
